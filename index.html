<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advaita Vicara: The Journey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Quicksand:wght@400;500&display=swap');
        .font-serif-vedic { font-family: 'Cinzel', serif; }
        .font-sans-vedic { font-family: 'Quicksand', sans-serif; }
        .fade-active { opacity: 1; transform: translateY(0); transition: all 0.5s ease-out; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #b45309; border-radius: 2px; }
    </style>
</head>
<body class="bg-slate-950 text-amber-50 min-h-screen flex flex-col justify-between font-sans-vedic overflow-x-hidden selection:bg-amber-900 selection:text-amber-100">

    <header class="bg-slate-900/60 backdrop-blur-md border-b border-amber-900/30 sticky top-0 z-50 px-4 py-3">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <span class="text-xs tracking-widest text-amber-500 uppercase font-serif-vedic font-bold">Inquiry Path</span>
            <div id="global-map" class="flex items-center space-x-1 text-[9px] tracking-tight">
                <span id="chap-0" class="text-amber-500 font-bold">1. SEER</span>
                <span class="text-slate-700">➔</span>
                <span id="chap-1" class="text-slate-500">2. JANAKA</span>
                <span class="text-slate-700">➔</span>
                <span id="chap-2" class="text-slate-500">3. MANDUKYA</span>
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center px-4 py-4 max-w-md w-full mx-auto relative">
        <div id="ambient-glow" class="absolute w-64 h-64 bg-amber-500/5 rounded-full blur-3xl pointer-events-none transition-all duration-1000"></div>

        <div id="game-card" class="w-full bg-slate-900/30 border border-amber-900/20 rounded-2xl p-5 backdrop-blur-sm shadow-2xl relative z-10 fade-active">
            
            <div id="chapter-tag" class="text-[9px] uppercase tracking-widest text-amber-600 font-serif-vedic mb-2">Loading...</div>

            <div class="w-full rounded-xl overflow-hidden border border-amber-900/10 mb-4 bg-slate-950/60 flex items-center justify-center relative">
                <div id="visual-art" class="w-full h-32 bg-gradient-to-b from-amber-950/10 to-slate-950 flex flex-col items-center justify-center p-4 text-center">
                    <svg id="visual-icon" class="w-8 h-8 text-amber-600/70 mb-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
                    <span id="visual-caption" class="text-[9px] tracking-widest text-slate-500 font-serif-vedic uppercase"></span>
                </div>
            </div>
            
            <div id="scenario-text" class="text-sm text-amber-100/90 leading-relaxed font-serif-vedic mb-4 border-l border-amber-700/40 pl-3 py-0.5"></div>

            <div class="bg-slate-950/70 border border-amber-900/10 rounded-xl p-3.5 mb-4">
                <p class="text-[10px] text-amber-500/60 font-serif-vedic uppercase tracking-wider mb-1">Inquiry Gate:</p>
                <p id="inquiry-question" class="text-xs text-slate-300 leading-relaxed font-medium"></p>
            </div>

            <div class="space-y-3">
                <textarea id="player-reflection" rows="2" placeholder="Contemplate and type your realization..." class="w-full bg-slate-950 border border-amber-950/60 rounded-xl px-3 py-2 text-xs text-amber-100 placeholder:text-slate-600 focus:outline-none focus:border-amber-600 transition-colors resize-none leading-relaxed"></textarea>
                
                <button onclick="submitReflection()" class="w-full bg-gradient-to-r from-amber-800 to-amber-700 text-slate-950 font-bold uppercase tracking-widest text-[10px] py-3 rounded-xl shadow-lg transition-all active:scale-[0.99]">
                    Cross This Bridge
                </button>
            </div>
        </div>
    </main>

    <footer class="bg-slate-950 border-t border-amber-900/10 py-2.5 px-4">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <button onclick="toggleJournal()" class="text-[9px] uppercase tracking-wider text-slate-500 hover:text-amber-500 font-serif-vedic transition-colors">
                📜 Notebook Entries (<span id="journal-count">0</span>)
            </button>
            <div id="game-status" class="text-[9px] text-amber-700 font-bold tracking-widest uppercase"></div>
        </div>
        <div id="journal-drawer" class="hidden max-w-md mx-auto mt-3 max-h-36 overflow-y-auto space-y-2 pt-2 border-t border-slate-900"></div>
    </footer>

    <script src="stages.js"></script>
    <script src="app.js"></script>
</body>
</html>
